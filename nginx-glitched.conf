# ============================================================
# GLITCHED.GG — Nginx Reverse Proxy Configuration
# Deploy to: /etc/nginx/sites-available/glitched.conf
# Enable: ln -s /etc/nginx/sites-available/glitched.conf /etc/nginx/sites-enabled/
# ============================================================

upstream glitched_web {
    server 127.0.0.1:3003;
    keepalive 64;
}

upstream glitched_ws {
    server 127.0.0.1:3004;
    keepalive 64;
}

upstream glitched_engine {
    server 127.0.0.1:3005;
    keepalive 64;
}

# HTTP redirect to HTTPS
server {
    listen 80;
    server_name glitched.gg www.glitched.gg glitched.ai;
    return 301 https://$server_name$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name glitched.gg www.glitched.gg glitched.ai;

    # SSL certificates (update paths)
    ssl_certificate /etc/letsencrypt/live/glitched.gg/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/glitched.gg/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Client body size (for file uploads)
    client_max_body_size 50M;

    # WebSocket proxy
    location /ws {
        proxy_pass http://glitched_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Game Engine API proxy
    location /api/engine {
        proxy_pass http://glitched_engine;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Static assets (long cache)
    location /_next/static/ {
        proxy_pass http://glitched_web;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_set_header Host $host;
    }

    # Public assets
    location /public/ {
        proxy_pass http://glitched_web;
        add_header Cache-Control "public, max-age=86400";
        proxy_set_header Host $host;
    }

    # Main app proxy
    location / {
        proxy_pass http://glitched_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
    }
}
